front:
  text: 序何謂乎醫案也斷病與處方而已蓋醫案汗牛充棟大都統治男婦雜症為居多而專治婦科則甚少吾吳顧鬘云女士婦科名醫也道咸間吳下士大夫皆爭延診而欽仰之曾著有花韻樓醫案一卷惜乎未刊行世知醫者偶一道及有欲求不得之憾余向藏有顧女士醫案鈔本其論治透徹立方平善洵是經驗之作方之現今女醫中實罕有與匹余屢欲鐫刊以供海內諸君子之研究然深慚力棉未能如志公諸同好意誠怏怏也爰是函商紹與醫藥學報社裘君吉生謀付剞劂以廣流傳幸承允可自茲以往風行寰宇則顧女士濟世利人之婆心既可不致湮沒裘君之讚揚功宏亦並垂不朽云民國紀元十年辛酉季冬吳縣張元瑞玉田氏序於吳趨青選書屋
