body:
  text: 正文汪醫案小産之後血崩月餘音低氣怯寐少咽乾面目浮腫干嗆陳作良由血去過多一派虛象蝟集矣古人以血崩為之崩中中者即脾胃也前方純用滋納固澀久服不效何以尚不悟其理耶蓋肝主藏血脾主攝血脾失統血之司血從內滲不已由於滋之澀之凝滯絡中所以時或淋漓若淨忽又瘀塊如掌大者絡繹而下自覺心神無依肢冷泄汗經云陰陽互根如環無端陰從下滲陽從上冒其中樞紐能無慮其不續耶急進歸脾法以為砥柱中流之計大有黨參三錢九制於術一錢新會皮七分丹皮炭一錢五分大有黃耆二錢大熟地炭五錢地榆炭三錢元眼肉三錢歸身一錢白芍一錢五分棗仁三錢用藕肉二兩湘蓮肉五錢煎湯代水汪又診前進血脫益氣法兼清營分虛火崩決之陳頓止胸脘乃覺舒和略思納穀可知從前謬執黃耆閉氣之誤然肝腎空乏八脈交虛最慮腹膨漏帶干嗆寒熱此四者崩後極易見之不可不為預防人參鬚一錢五分大有耆一錢五分陳阿膠二錢地榆皮三錢西黨參三錢制於術一錢五分炒丹皮一錢五分棗仁三錢白芍一錢五分雲苓三錢元眼肉三錢湘蓮肉四錢汪又診崩止三日神脈皆振頭暈轟熱時仍有之必得營陰恢復風陽遊行之象方可全熄耳人參一錢制冬朮一錢五分陳阿膠二錢牡蠣五錢棗仁三錢黃耆二錢西黨參三錢熟地炭四錢川貝三錢白芍一錢五分加鮮藕肉一兩汪又診肝風漸定諸症較平夜寐漸安惟面色指爪㿠白不堪胃氣雖醒脾少健運知飢不任油膩須得屏除煩勞靜養百日氣血充復可期也人參鬚一錢五分制於術一錢五分甘枸子三錢炒棗仁三錢綿黃耆三錢炙甘草四分陳阿膠二錢炙陳皮七分元眼肉三錢大黑棗二枚加建蓮三錢汪又診日來精神大勝於前唇漸轉紅眠食頗佳陽明血液日長矣黨參三錢炒棗仁三錢炒米仁三錢九制於術一錢五分黃耆二錢炒白芍一錢五分炙陳皮五分炙黑甘草三分陳阿膠二錢蛤粉炒元眼肉三錢大黑棗兩枚張醫案脾腎陽衰早食暮吐完穀不化是無火也並非火熱暴迫之完穀下趨耳舌質淡而苔白脈細帶絃溫中以理氣分上肉桂淡吳萸白茯苓老蘇梗益智仁煨肉果炒白芍新會皮戈半夏張又診水穀入胃易生痰濕者多由脾虛土衰今且肝木來侮上則噯腐吐食下則便泄腹脹升降皆屬格礙專理中宮之陽為的當也淡乾薑益智仁雲苓新會皮淡吳萸甘草炭炒白芍姜半夏干玫瑰花張又診溫煦脾胃中焦氣機已得旋暈果然陰復遲而陽復速也製附子煨肉果炒白芍苡仁製厚朴淡吳萸橘白建曲雲苓張又診反胃已止當扶脾胃之氣佐以養肝之血人參條雲苓新會皮淨歸身生冬朮炙草炭姜半夏炒白芍炒苡仁香穀芽停藥劑後以香砂六君丸三錢每朝炒黃米泡湯送下謝醫案思慮傷脾鬱怒傷肝血崩之下氣營大虛徹夜不寐神不自持觸事驚疑此乃怔忡疑慮之症並非癲癇類也脈症合參脾藏氣血大傷脾為營之源雖云心主生血然血不自生須得脾氣運液中焦取汁變化而成心虛而不知補脾絶其生血之源矣且大便亦溏膽怯異常顯屬不足之症切勿執定痰火有餘也大生地炒白芍炒棗仁雲苓制冬朮廣鬱金元眼肉麥冬蓮肉川貝謝又診脈象細而帶弦微見虛數血崩本屬氣虛下陷血去陰液亦虧心中悸惕驚疑無主尋源求本之計宜補立中氣為先倘專清痰火必有延成痼疾者也黨參制冬朮大麥冬歸身黃耆炙黑草血餘炭白芍雲苓棗仁川貝母加龍眼肉大黑棗謝又診日來脈象頗形起色元氣漸振故恐懼憂疑之象已可支持肝鬱日暢寡有惱怒誠佳機也心脾血液未充尚須怡養為佳制洋參云茯神五味子川貝制冬朮左牡蠣元眼肉苡仁棗仁生甘草加金橘餅野薔薇露臨臥服白金丸三分謝又診不寐陽升脾氣下陷風陽遊行無定腎志少液當引陽潛藏之法黨參大熟地左牡蠣白芍黃耆製附子池菊瓣棗仁橘白炙草川石斛元眼肉加雞子黃謝又診大便得實腎液藏而脾氣運矣神情漸復惟或感心事肝陽猶易擾及包絡亦由心營血氣未能充足耳黨參元參心遠志炭炒棗仁黃耆川貝母大熟地柏子仁山藥炙甘草龍眼肉謝又診行動步履有力眠食亦均勻適中中氣雖復血虛猶少營養血不養肝肝經鬱火欲達未達現值暑令當於補劑之中參入清暢之品秋涼肅降時可冀無恙仿許學士法加減大生地黨參赤芍川貝烏犀尖雲苓玳瑁山藥麥冬橘白加囫圇雞子黃白荷花露張醫案新産兩朝瘀不下行發熱神蒙肢麻汗多脈芤舌紅酷暑外迫陰氣鬱冒血隨氣逆時有昏暈變險可危急扶産母端坐椅中敞軒窗以湘簾護風切勿聽信嫗輩膠執吃熱苦草湯也急囑急囑細生地廣鬱金懷牛膝歸身川貝母白蒺藜西琥珀赤芍丹皮白薇鮮藕肉童便張又診熱退神清氣火平降瘀亦下行兩臂尚麻少腹痠楚仍從養血通瘀即是治風先治血之意也細生地淨歸身茺蔚子赤芍炒山藥白蒺藜懷牛膝丹皮白薇楂炭琥珀湯醫案鬱火越冒衝心為厥厥後心悸不寐驚恐疑懼劫肺而為痰血不時形凜轟熱經行如崩月行二次盛暑而厚衣稀粥不敢下咽以脈症參之非真寒實由疑慮過深所致也金先生指為勞損不起之症竊恐未確當放膽啖飯不必避風以怡暢襟懷佐以藥力可許向痊者烏犀尖小川連雲苓麥冬大生地廣鬱金白芍橘白棗仁川貝加建蓮子湯又診病人深信所囑肝膽舒暢寒熱未作人咸異之即俗名疑心病也信能堅決何疑之有所謂智慧劍斬煩惱魔須藥餌外求之者仍須清暢鬱火補養心脾方無反復細生地烏犀尖小川連麥冬生於術羚羊角川貝母棗仁米仁紅棗湯又診穀食如常神情安適心悸咳血皆止鼻流腥水如注此乃鬱火從心包而暢於肺經也養陰佐以清和肺肝制首烏元參心川貝母白芍羚羊角蔓荊子淮山藥生甘草薄荷葉湯又診鼻淵雖止其鬱火未淨心脾氣血未復諸恙和平癸水尚易驂前仍從前法減輕為治細生地羚羊角川楝子左牡蠣生冬朮川貝母元參心大麥冬雲苓小紅棗張醫案冬溫乍發月事適行陰氣先虛邪從內傳一候之前失於開泄肺經今病交十三日曾服小柴胡湯微微得汗惟邪轉充斥肺胃兼入營分矣晝夜煩躁神魂飛越脈澀弦數舌絳苔厚痰滯並阻大便溏泄深恐痙厥必多風波變險淡豆豉牛蒡子丹皮川貝母細生地淡黃芩楂炭廣鬱金苦桔梗秦艽赤苓張辰刻又診病交兩候癸水淋漓未淨色帶紫黑營熱熾甚通宵不寐寅卯時肝風內動指痙發厥目竄痰湧遍體汗泄而定頃診右脈洪數舌苔根厚色轉灰黃大便連泄自覺火熱下注溫邪欲陷昏閉可慮但營分滲泄於下肺邪壅遏於上斷不能執煞熱入血室之古法也細生地淡黃芩丹皮薄荷小川連廣鬱金赤芍生甘草天花粉生麥芽白茆根張酉刻又診溫邪自口鼻吸入肺先受之逆傳心包入暮病劇脈較晨間數甚再與清解勿致昏閉為妙鮮生地玉捲心丹皮川貝淡黃芩元參心麥冬桔梗天花粉生甘草張又診昨宵煩躁陳作風痙略緩子後稍稍得寐寐醒痰火上升欲厥未厥便泄溲短陰傷熱戀熱化庶無變幻烏犀角天竺黃元參赤芍細生地竹捲心麥冬花粉知母淡芩張又診溫邪自肺傳入手厥陰經煩躁譫語痰潮昏湧疊進清滋化熱內保心陰雖然不致內閉其邪欲達未達包絡清虛之所邪火爍津凝痰蒙閉非芳香宣竅莫解陳金汁二兩化服至寶丹四分張又診昨診脈後狂躁厥逆即以至寶丹服下神志漸定吐咳濃痰頗暢黎明時得寐寐醒尚覺氣逆便泄已止口苦咽關疳點密布冬溫化毒乃外泄之機烏犀尖鮮霍斛苦桔梗甘中黃鮮生地元參心天竺黃土貝黃芩赤芍加陳金汁野薔薇露張酉刻又診胸膈肌膚熱勢大減額上解而不了了脈息左含靜意右寸關尚見滑數舌絳苔少疳點起腐痛甚心中煩擾月水將淨清化上焦痰熱為主羚羊角淡芩海浮石土貝鮮霍斛元參白杏仁甘中黃天花粉廣鬱金枇杷葉鮮蘆根張又診冬溫失治於前病涉三候溫邪化燥幾至內陷幸得邪從疳化熱退轉機經水乍止營陰虧乏肺胃餘熱尚熾須防液涸烏犀尖鮮霍斛元參知母鮮生地淡黃芩麥冬土貝飛青黛甘中黃陳金汁銀花露張又診舌苔焦黃已化脈數頗緩汗多如注疳勢蔓延亦定白腐漸退音閃渴飲痰多黃厚口中膩涎若湧外邪將淨脾虛血熱濕火內生以玉女煎合甘露飲加減大生地生洋參知母川貝生石羔生冬朮川連甘中黃鮮霍斛鮮竹茹白粳米鮮蘆根張又診汗尚多熱退極淨大便三日未行邪滯已得歸併胃腑可免傳變之慮口膩渴飲均減小便漸利陽明餘燼未熄仍恐復燃生洋參細生地甘中黃鮮竹茹鮮霍斛生石羔川貝母生枳殼肥知母全栝蔞鮮蘆根枇杷葉露張又診疳痛大緩穀食可進寐醒之後溲急欲遺數而且多是餘熱宿垢蘊結陽明迫其膀胱津液下行也汗泄又多胃津更傷大腸愈燥燥火更易傷陰納穀未多能勿慮其液涸乎傷寒論有可下不可下並急下存陰等法兩者俱是回生要關但須用之的當今見口竭引飲舌苔老黃乾裂根尤厚濁脈象數實按腹微痛如斯確據誠乃急下存陰時候矣每見邪未歸府誤下致逆不可勝數生西參元明粉全栝蔞生白芍鮮霍斛火麻仁萊蔔子生甘草大麥冬白粳米張又診矢氣頻轉而便未行舌苔化動納穀較多仍守昨法西洋參鮮首烏火麻仁生甘草鮮霍斛元明粉生白芍白粳米大麥冬甜梨汁張又診昨晚大便後夜臥極安胃思納穀神脈安靜小便合度腸胃宿垢已徹餘邪下注肛側結有小瘰且痙厥時擦傷皮膚滋水頻滋兩相蔓延頗形痛楚雖屬微末猶恐妨礙眠食亦屬節外生枝之纍也西洋參鮮首烏生白芍川柏鮮霍斛火麻仁生甘草肥知母橘白加大黑豆五錢緑豆五錢張又診大便續通自覺脘腹舒暢安寐安穀腑邪化淨瘍痛亦緩偶觸惱怒心悸耳鳴胃陰初長不勝木火之煽爍也溫邪病後調養失慎三復可慮重言以申明之西洋參鮮霍斛生白芍生甘草細生地淡天冬天花粉甜梨汁濂珠粉燕窩屑張又診神怡氣陰漸復飲食寒暖慎調是囑人參鬚川石斛山藥茯苓細生地鮮竹茹白芍橘白生穀芽小紅棗家母痢症操勞之體真陰不足夏令心陽少暢交秋肺氣鬱而不宣肝木挾暑濕先從上擾巔痛咳嗽舊恙發而未甚適觸穢氣濁邪壅遏反從下走先瀉轉痢赤白雜下表有微熱正虛邪盛勢正方張擬表裡合解邪宜速達則免傷正廣藿梗赤芍青皮枳實秦艽赤苓楂炭建曲白蔻仁鮮佛手家母又診表熱得汗而解痛勢裡急後重痢次晝夜數十遍赤白紫滯納穀勉強口苦舌糙乃血鬱熱結也每於痢下甚時積多糞少後重極甚細參病機寐中略有咳嗽醒時痛緩乍醒痛緩之時積少糞下極暢似乎寐則氣火下行陰液得養肺氣開而腸胃積滯能下當顧腎陰而化里邪逆流挽舟法斷不能用謹以辨症之法質諸高明教正焉廣藿梗桔梗青皮楂炭丹皮枳實建曲白芍赤苓益元散家母又診氣分濕滯已減但痛勢盛於下午邪伏血分何疑痢色紫滯夾白氣陰兼理西黨參五錢建曲一錢五分同炒白蒺藜三錢青皮五分烏藥一錢阿膠二錢薺菜花三錢丹皮一錢五分銀花炭三錢側柏炭一錢山楂炭三錢加香連丸一錢家母又診舌苔漸化納穀較增痢暢而稀其痛勢雖在胃脘觀食下時並不作痛關脈弦數屬血分之邪發越肝木並逆也當參三錢建曲一錢五分同炒丹皮炭一錢五分枳殼三分銀花炭三錢阿膠二錢青皮五分白蒺藜三錢側柏炭一錢烏藥一錢益元散三錢家母又診血分之暑邪郁邪俱化痛止痢亦將止脾氣腎陰虛機略振便時指尖微冷寐少耳鳴守臟真為主和腸胃為佐老山人參三錢炮薑